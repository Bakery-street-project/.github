name: 🧪 Weekly Lab Notes (NVIDIA NIM)

on:
  schedule:
    - cron: '0 9 * * 1'   # Every Monday 09:00 UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  generate-lab-notes:
    name: Summarize Weekly Commits with Nemotron Ultra
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect commits from last 7 days
        id: commits
        run: |
          SINCE=$(date -d '7 days ago' --iso-8601=seconds)
          LOG=$(git log --since="$SINCE" --pretty=format:"- %s (%an, %ar)" --all | head -60)
          if [ -z "$LOG" ]; then
            LOG="No commits in the past 7 days."
          fi
          # Safe multiline output
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate AI summary via NVIDIA NIM (Nemotron Ultra 253B)
        id: summary
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          COMMITS="${{ steps.commits.outputs.log }}"

          PAYLOAD=$(jq -n \
            --arg commits "$COMMITS" \
            '{
              model: "nvidia/llama-3.1-nemotron-ultra-253b-v1",
              messages: [
                {
                  role: "system",
                  content: "You are the AI Lab Notes bot for Bakertreet Labs. Write concise, engaging weekly engineering summaries in Markdown. Include: key themes, technical highlights, and one forward-looking insight. Max 300 words. Use emoji sparingly but effectively."
                },
                {
                  role: "user",
                  content: ("Here are this week'\''s commits across all repositories:\n\n" + $commits + "\n\nWrite the Lab Notes summary.")
                }
              ],
              max_tokens: 512,
              temperature: 0.6,
              top_p: 0.95
            }')

          RESPONSE=$(curl -s https://integrate.api.nvidia.com/v1/chat/completions \
            -H "Authorization: Bearer $NVIDIA_API_KEY" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Bakertreet-Labs-LabNotes/1.0" \
            -d "$PAYLOAD")

          SUMMARY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // "⚠️ NIM API returned no content. Check NVIDIA_API_KEY secret."')

          {
            echo "text<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Get week label
        id: week
        run: echo "label=$(date +'Week of %B %d, %Y')" >> "$GITHUB_OUTPUT"

      - name: Post Lab Notes as GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const summary = `${{ steps.summary.outputs.text }}`;
            const commits = `${{ steps.commits.outputs.log }}`;
            const week = `${{ steps.week.outputs.label }}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🧪 Lab Notes — ${week}`,
              body: [
                `## 🧪 Bakertreet Labs — Weekly Lab Notes`,
                `> *Generated by [NVIDIA Nemotron Ultra 253B](https://build.nvidia.com/nvidia/llama-3_1-nemotron-ultra-253b-v1) via NVIDIA NIM*`,
                ``,
                summary,
                ``,
                `---`,
                `<details>`,
                `<summary>📋 Raw Commit Log</summary>`,
                ``,
                `\`\`\``,
                commits,
                `\`\`\``,
                `</details>`,
                ``,
                `*Auto-generated every Monday · [View workflow](.github/workflows/lab-notes.yml)*`
              ].join('\n'),
              labels: ['lab-notes', 'automated']
            });
