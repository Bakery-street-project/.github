name: 🔐 Secret Leak Scanner

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: '0 3 * * 0'  # Full history scan every Sunday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks — Regex Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Optional: for SARIF upload on public repos
        with:
          args: detect --source=. --verbose --redact --exit-code=1

  trufflehog:
    name: TruffleHog — Verified Credential Scanner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog (verified secrets only)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified --fail

  detect-secrets:
    name: detect-secrets — Baseline Entropy Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan with detect-secrets
        run: |
          detect-secrets scan --all-files \
            --exclude-files '\.lock$' \
            --exclude-files 'package-lock\.json' \
            --exclude-files '\.min\.js$' \
            > /tmp/secrets-report.json
          
          # Fail if any secrets found
          COUNT=$(jq '[.results | to_entries[] | .value[] ] | length' /tmp/secrets-report.json)
          echo "Potential secrets found: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "::error::detect-secrets found $COUNT potential secrets. Review /tmp/secrets-report.json"
            jq '.results' /tmp/secrets-report.json
            exit 1
          fi
